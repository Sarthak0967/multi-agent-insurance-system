version: '3.8'

services:

  backend:
    image: insurance-backend
    container_name: insurance-backend
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend:
    image: insurance-frontend
    container_name: insurance-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network: