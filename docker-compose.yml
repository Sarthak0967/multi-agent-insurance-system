services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: insurance-backend
    container_name: insurance-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: insurance-frontend
    container_name: insurance-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network: